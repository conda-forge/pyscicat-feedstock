{% set name = "pyscicat" %}
{% set version = "0.4.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/39/3c/fe1e90dad39ac3037ba057daf3811e4cf4995838a2150d44fce6e554340c/pyscicat-{{ version }}.tar.gz
  sha256: 1f32988a2adac1f49475289e0793ecd62fd9fb695ecffad4da36de584d7c1d37

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python >=3.7
  run:
    - pydantic
    - python >=3.7
    - requests

test:
  imports:
    - pyscicat
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/scicatproject/pyscicat
  summary: Code for communicating to a SciCat backend server python
  license: BSD-3-Clause
  license_file: LICENSE
  doc_url: https://scicatproject.github.io/pyscicat/
  description: An API to upload data into Scicat. If using Scicat version 3, you will need to use pyscicat < 0.4.1 , if using Scicat v4 please use latest release.
extra:
  recipe-maintainers:
    - lashemilt
    - abigailalexander
    - RFIMarvin
